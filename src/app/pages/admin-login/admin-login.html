<main class="admin-login-page">
  <section class="login-panel" aria-labelledby="admin-login-title">
    <p class="eyebrow">Admin</p>
    <h1 id="admin-login-title">Sign in</h1>

    <form [formGroup]="loginForm" (ngSubmit)="submit()" class="login-form" novalidate>
      <label class="field">
        <span>Email</span>
        <input
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="admin@example.com"
          [attr.aria-invalid]="hasError('email')"
        />
        @if (hasError('email')) {
          <small>Enter a valid email address.</small>
        }
      </label>

      <label class="field">
        <span>Password</span>
        <input
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="Password"
          [attr.aria-invalid]="hasError('password')"
        />
        @if (hasError('password')) {
          <small>Password is required.</small>
        }
      </label>

      <button type="submit" [disabled]="isSubmitting()">
        @if (isSubmitting()) {
          Signing in...
        } @else {
          Log in
        }
      </button>

      @if (errorMessage()) {
        <p class="status error">{{ errorMessage() }}</p>
      }
    </form>
  </section>
</main>
